<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscribe | AI Business Services</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://js.stripe.com/v3/"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <div class="container mx-auto px-6 py-16 max-w-2xl">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold mb-2">Subscribe</h1>
            <p class="text-gray-400">AI Business Services</p>
        </div>

        <div class="bg-gray-800 rounded-2xl p-8 mb-8">
            <h2 class="text-2xl font-bold mb-6">Choose Your Plan</h2>
            
            <div class="space-y-4">
                <label class="block bg-gray-700 p-6 rounded-xl cursor-pointer hover:bg-gray-600 transition border-2 border-transparent checked:border-green-500">
                    <input type="radio" name="plan" value="starter" class="hidden">
                    <div class="flex justify-between items-center">
                        <div>
                            <h3 class="text-xl font-bold">Starter</h3>
                            <p class="text-gray-400">10 hours/month</p>
                        </div>
                        <div class="text-2xl font-bold text-green-400">$0/mo</div>
                    </div>
                </label>
                
                <label class="block bg-gray-700 p-6 rounded-xl cursor-pointer hover:bg-gray-600 transition border-2 border-green-500">
                    <input type="radio" name="plan" value="growth" class="hidden" checked>
                    <div class="flex justify-between items-center">
                        <div>
                            <h3 class="text-xl font-bold">Growth</h3>
                            <p class="text-gray-400">40 hours/month</p>
                        </div>
                        <div class="text-2xl font-bold text-green-400">$199/mo</div>
                    </div>
                </label>
                
                <label class="block bg-gray-700 p-6 rounded-xl cursor-pointer hover:bg-gray-600 transition border-2 border-transparent">
                    <input type="radio" name="plan" value="enterprise" class="hidden">
                    <div class="flex justify-between items-center">
                        <div>
                            <h3 class="text-xl font-bold">Enterprise</h3>
                            <p class="text-gray-400">Unlimited hours</p>
                        </div>
                        <div class="text-2xl font-bold text-green-400">$499/mo</div>
                    </div>
                </label>
            </div>
        </div>

        <div class="bg-gray-800 rounded-2xl p-8 mb-8">
            <h2 class="text-2xl font-bold mb-6">Your Info</h2>
            <form id="paymentForm" class="space-y-4">
                <div>
                    <label class="block text-gray-400 mb-2">Name</label>
                    <input type="text" id="name" required class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 text-white">
                </div>
                <div>
                    <label class="block text-gray-400 mb-2">Email</label>
                    <input type="email" id="email" required class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 text-white">
                </div>
                <div>
                    <label class="block text-gray-400 mb-2">Service Needed</label>
                    <textarea id="service" rows="3" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 text-white" placeholder="Tell us what you need help with..."></textarea>
                </div>
            </form>
        </div>

        <button onclick="submitOrder()" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-4 rounded-xl text-xl transition">
            Submit Request
        </button>

        <p class="text-center text-gray-500 mt-4 text-sm">
            Secure payment powered by Stripe
        </p>
    </div>

    <script>
        function submitOrder() {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const service = document.getElementById('service').value;
            const plan = document.querySelector('input[name="plan"]:checked').value;
            
            if (!name || !email) {
                alert('Please fill in your name and email!');
                return;
            }

            // Save order
            const orders = JSON.parse(localStorage.getItem('orders') || '[]');
            orders.push({
                name, email, service, plan,
                date: new Date().toISOString()
            });
            localStorage.setItem('orders', JSON.stringify(orders));

            alert('Thank you! We will contact you at ' + email + ' within 24 hours to set up payment and start service.');
        }
    </script>
</body>
</html>
