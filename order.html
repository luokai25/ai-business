<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Now | AI Virtual Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 min-h-screen text-white flex items-center justify-center">
    <div class="max-w-md w-full mx-4">
        <div class="bg-gray-800 rounded-2xl p-8">
            <h1 class="text-2xl font-bold mb-6 text-center">Complete Your Order</h1>
            
            <div class="mb-6 p-4 bg-gray-700 rounded-lg">
                <div class="flex justify-between mb-2">
                    <span>AI Virtual Assistant</span>
                    <span class="font-bold">$199/mo</span>
                </div>
                <div class="text-sm text-gray-400">Growth Plan</div>
            </div>

            <form id="paymentForm" class="space-y-4">
                <input type="text" placeholder="Your Name" required class="w-full bg-gray-700 rounded-lg px-4 py-3">
                <input type="email" placeholder="Email" required class="w-full bg-gray-700 rounded-lg px-4 py-3">
                <div class="text-sm text-gray-400 text-center py-2">
                    Payment integration coming soon.<br>
                    <span class="text-yellow-400">Contact us to pay via PayPal/Crypto</span>
                </div>
                <button type="submit" class="w-full bg-green-500 hover:bg-green-600 font-bold py-3 rounded-lg">
                    Request Invoice
                </button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('paymentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Thanks! We will send you an invoice within 24 hours.');
        });
    </script>
</body>
</html>
